server:
  port: 9091

spring:
  cloud:
    config:
      enabled: false
  #  Su dung optional de khong loi neu chua co Config Server
#  config:
#    import: "optional:configserver:"
#  cloud:
#    config:
#      uri: "http://localhost:8888"

  application:
    name: user-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/db_user_service
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

